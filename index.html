<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <title>Camera PWA Test</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="camera-panel" aria-label="Camera preview">
        <video id="cameraPreview" autoplay playsinline muted></video>
        <div id="emptyState" class="empty-state">
          <div class="lens-mark" aria-hidden="true"></div>
          <p>カメラを開始すると、ここに映像が表示されます。</p>
        </div>
      </section>

      <section class="controls" aria-label="Camera controls">
        <div>
          <h1>Camera PWA Test</h1>
          <p id="statusText">待機中</p>
        </div>
        <div class="button-row">
          <button id="startButton" type="button">カメラ開始</button>
          <button id="stopButton" type="button" disabled>停止</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
