<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <title>Camera PWA Test</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="camera-panel" aria-label="Camera preview">
        <video id="cameraPreview" autoplay playsinline muted></video>
        <canvas id="captureCanvas" hidden></canvas>
        <div id="emptyState" class="empty-state">
          <div class="lens-mark" aria-hidden="true"></div>
          <p>&#12459;&#12513;&#12521;&#12434;&#38283;&#22987;&#12377;&#12427;&#12392;&#12289;&#12371;&#12371;&#12395;&#26144;&#20687;&#12364;&#34920;&#31034;&#12373;&#12428;&#12414;&#12377;&#12290;</p>
        </div>
        <figure id="photoPreview" class="photo-preview" hidden>
          <img id="capturedImage" alt="Captured photo">
        </figure>
      </section>

      <section class="controls" aria-label="Camera controls">
        <div>
          <h1>Camera PWA Test</h1>
          <p id="statusText">&#24453;&#27231;&#20013;</p>
        </div>
        <div class="button-row">
          <button id="startButton" type="button">&#12459;&#12513;&#12521;&#38283;&#22987;</button>
          <button id="captureButton" type="button" disabled>&#25774;&#24433;</button>
          <button id="saveButton" type="button" disabled>&#12473;&#12510;&#12507;&#12395;&#20445;&#23384;</button>
          <button id="stopButton" type="button" disabled>&#20572;&#27490;</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
